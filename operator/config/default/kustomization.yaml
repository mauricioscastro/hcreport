kind: Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1

namespace: hcr

namePrefix: hcr-

resources:
- ../crd
- ../rbac
- ../webhook
- ../manager
#- ../prometheus

patches:
- path: manager_auth_proxy_patch.yaml
- path: manager_webhook_patch.yaml

replacements:
- source: 
    name: hcr-webhook-service
    kind: Service
    version: v1
  targets:
  - select: 
      kind: Deployment
      name: hcr-controller-manager
    fieldPaths:
      - spec.template.spec.containers.[name=manager].env.[name=HCR_WEBHOOK_SERVICE_NAME].value
- source: 
    kind: Namespace
  targets:
  - select: 
      kind: Deployment
      name: hcr-controller-manager
    fieldPaths:
      - spec.template.spec.containers.[name=manager].env.[name=HCR_WEBHOOK_SERVICE_NAMESPACE_NAME].value
- source: 
    kind: ValidatingWebhookConfiguration
  targets:
  - select: 
      kind: Deployment
      name: hcr-controller-manager
    fieldPaths:
      - spec.template.spec.containers.[name=manager].env.[name=HCR_WEBHOOK_VALIDATE_CFG_NAME].value
  - select: 
      kind: ClusterRole
      name: webhook-manager-role
    fieldPaths:
      - rules.0.resourceNames.0
- source: 
    kind: MutatingWebhookConfiguration
  targets:
  - select: 
      kind: Deployment
      name: hcr-controller-manager
    fieldPaths:
      - spec.template.spec.containers.[name=manager].env.[name=HCR_WEBHOOK_MUTATE_CFG_NAME].value
  - select: 
      kind: ClusterRole
      name: webhook-manager-role
    fieldPaths:
      - rules.0.resourceNames.1